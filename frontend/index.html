<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReviQ – SLR Workbench</title>
    <!-- Primary favicon: SVG file served from /public -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback: canvas-generated PNG for browsers that don't support SVG favicons -->
    <script>
      (function () {
        var c = document.createElement('canvas'); c.width = c.height = 64;
        var x = c.getContext('2d');
        x.beginPath(); var r = 11;
        x.moveTo(r,0); x.lineTo(64-r,0); x.arcTo(64,0,64,r,r);
        x.lineTo(64,64-r); x.arcTo(64,64,64-r,64,r);
        x.lineTo(r,64); x.arcTo(0,64,0,64-r,r);
        x.lineTo(0,r); x.arcTo(0,0,r,0,r);
        x.closePath(); x.fillStyle='#003057'; x.fill();
        x.fillStyle='white'; x.font='bold 46px system-ui,sans-serif';
        x.textAlign='center'; x.textBaseline='middle'; x.fillText('R',32,35);
        var l=document.createElement('link'); l.rel='icon'; l.type='image/png';
        l.href=c.toDataURL('image/png'); document.head.appendChild(l);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
